services:
  - type: web
    name: factory3-dashboard
    runtime: python
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
