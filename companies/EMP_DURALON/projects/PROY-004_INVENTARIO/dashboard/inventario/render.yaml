services:
  - type: web
    name: uc101-inventario
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SCHEMA
        value: uc101_proy004
      - key: FACTORY_API_URL
        value: https://factory3.onrender.com
      - key: FACTORY_WRITE_KEY
        sync: false
