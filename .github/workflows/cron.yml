name: factory3 cron

on:
  workflow_dispatch:

jobs:
  run-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar meta_task_runner
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://factory3.onrender.com/cron/tasks \
            -H "Content-Type: application/json" \
            -d "{}"
